  passed_checks:
    - 已按 PRD、Mission 和 WI-001 重新审查架构、需求追踪、OpenAPI、SSE、数据模型、安全、Mock、骨架和验证报告。
    - OpenAPI 21 paths/22 operations 通过 Redocly lint，TypeScript 类型可无差异再生成，三类 SSE 示例检查与凭据扫描通过。
    - 两个前端及共享包 typecheck/build 通过；Python ruff 与 strict mypy 通过。
    - 在 Python 3.12.13、PostgreSQL 16 一次性环境复现 migration upgrade/downgrade/upgrade，原有 pytest 5/5 通过，真实数据库 readiness 返回 200。
    - 相比第一次提交，最小充分选型、复杂机制删减、PostgreSQL 纵向切片、权限过滤和 API Key AES-GCM 边界已有实质改进。
  reasons:
    - 管理员初始化只有“admin/admin 风险已接受”的文字，没有可重复执行的 bootstrap/seed 边界、命令、幂等规则或测试；migration 只建 admins 表，不会产生 Mission 要求的初始管理员，初始化责任也未明确下放。
    - OpenAPI 规定退出只停止“由当前精确用户 Session 启动”的生成并保留同用户其他 Session，但 generations 没有 initiating_session_id，认证只返回 user_id；在 PRD 允许同账号多设备并行 Session 的前提下，该语义无法实现且会误停或漏停。
    - 架构、追踪矩阵和骨架把上下文固定为最多最近 10 个完整轮次，直接收窄了 PRD“在模型支持范围内尽可能携带、超限时从最早完整轮次移除”的规则；未提供模型上下文预算、token 裁剪或 Mission Owner 批准的产品偏差。
    - messages 仅以 created_at 表示顺序，且同一事务用 PostgreSQL now() 创建的用户消息与助手占位具有完全相同时间戳；实测两行时间相同，又没有 conversation 内序号或语义稳定的次级排序键，无法保证用户端和管理端跨分页的严格原始顺序。
    - 黑盒请求 content 仅含空格时返回 200，创建空会话标题和空用户消息，并产生 delta=""；这同时违反 PRD 的 trim 后空消息禁止规则和 GenerationDeltaEvent 的 minLength 1。
    - 实际 completed/GET generation 对象始终返回未在 OpenAPI Generation 中声明的 errorCode，而该 Schema 设置 additionalProperties false；现有 test_contract_subset 只检查路径存在，没有验证实际响应或 SSE 载荷符合合同。
    - OpenAPI 声明所有时间为 UTC，但在 Asia/Shanghai PostgreSQL 会话下实测 generation/message 时间序列化为 +08:00；当前代码未把数据库时间显式转换为 UTC。
    - OpenAPI 和 README 承诺数据库不可用时 API 存活并由 /healthz 返回 503 degraded；实测 lifespan 先执行 fail_interrupted_generations，连接失败会使应用 startup 退出，端点无法响应。恢复后的中断生成收敛策略也未定义。
  required_changes:
    - 补充管理员初始账号的安全、幂等、可重复初始化方案及明确执行入口；至少验证密码以强哈希落库、重复执行不产生重复管理员，并说明后续部署 Work Item 如何调用。
    - 在认证 Principal、generations 数据模型、migration、logout/stop 流程和测试中建立生成与发起 user_session 的可检查关联；增加两个 Session 并存时退出只影响当前 Session 生成的用例。
    - 取消未经批准的固定 10 轮产品收窄，提供基于当前模型上下文能力与输出预留的完整轮次裁剪规则；若无法满足 PRD，先通过 Message 请求 Mission Owner 决策。
    - 为每个会话增加稳定消息顺序机制并用于上下文、用户消息页和管理消息页；覆盖同事务同时间戳、重试、分页边界和正序展示测试。
    - 对 content 先 trim 再执行 1 至 4000 字符校验；空白请求必须返回合同错误且不创建任何会话、消息、generation 或 LLM call，SSE 不得产生空 delta。
    - 让真实 JSON/SSE 载荷与 OpenAPI 严格一致，补齐或移除 errorCode，并增加 actual response/SSE schema 校验，而不是只检查 operation path 子集。
    - 显式保证 API 时间输出为 UTC；增加数据库时区为 Asia/Shanghai 时仍输出 UTC 的测试。
    - 统一 lifespan 中断收敛与 health 合同，使数据库不可用时行为可复现；若保留 503 承诺，应确保应用能启动、返回 degraded，并在数据库恢复后安全完成遗留 streaming 收敛。
    - 更新 answer、architecture、data-model、security、OpenAPI/SSE、DDL/migration、Mock、类型、测试和 validation-report 为一个完整一致版本，并把仍标为 revision 4 review-candidate 的版本说明更新为本次重提基线。
  resubmission:
    - 在同一 RUN-WI-001-solution-architect 中恢复 active；完成全部修正和新增反例测试后再次置为 in_review，并发送新的 artifact_review_requested Message。
